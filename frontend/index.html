<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
<title>QA Assistant</title>
<!-- Markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
<!-- Syntax highlighting for code blocks -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11"></script>
<style>
/* Color Palette (Lavender / Purple theme)
 * Lavender Light: #F5F0FA
 * Lavender Medium: #E8DDF2
 * Lavender Dark: #D1C3E0
 * Purple Deep: #5B2D8E
 * Purple Rich: #6B3FA0
 * Purple Medium: #8B5CC0
 * Purple Light: #A87FD4
 * Lilac: #C4A0E5
 */

* {
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  margin: 0;
  padding: 20px;
  background: linear-gradient(135deg, #F5F0FA 0%, #E8DDF2 50%, #D1C3E0 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.container {
  max-width: 900px;
  width: 100%;
  margin: 0 auto;
  background: #F5F0FA;
  border-radius: 12px;
  box-shadow: 0 10px 40px rgba(91,45,142,0.15);
  display: flex;
  flex-direction: column;
  height: calc(100vh - 40px);
  overflow: hidden;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid #D1C3E0;
  flex-shrink: 0;
}

.header-content {
  text-align: center;
  flex: 1;
}

.new-chat-btn {
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 500;
  color: #6B3FA0;
  background: transparent;
  border: 2px solid #6B3FA0;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.new-chat-btn:hover {
  background: #6B3FA0;
  color: white;
}

h1 {
  margin: 0 0 5px 0;
  color: #6B3FA0;
  font-size: 1.5rem;
}

.subtitle {
  color: #666;
  margin: 0;
  font-size: 0.9rem;
}

/* Chat Messages Area */
.chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.chat-container::-webkit-scrollbar {
  width: 8px;
}

.chat-container::-webkit-scrollbar-track {
  background: #E8DDF2;
  border-radius: 4px;
}

.chat-container::-webkit-scrollbar-thumb {
  background: #D1C3E0;
  border-radius: 4px;
}

.chat-container::-webkit-scrollbar-thumb:hover {
  background: #B9A7D0;
}

.message {
  max-width: 80%;
  padding: 12px 16px;
  border-radius: 16px;
  line-height: 1.5;
  word-wrap: break-word;
}

.message.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #6B3FA0 0%, #8B5CC0 100%);
  color: white;
  border-bottom-right-radius: 4px;
  white-space: pre-wrap;
}

.message.assistant {
  align-self: flex-start;
  background: #E8DDF2;
  color: #333;
  border-bottom-left-radius: 4px;
  border: 1px solid #D1C3E0;
}

.message.assistant.streaming {
  border-color: #8B5CC0;
}

.message.error {
  background: #faf0ff;
  color: #5B2D8E;
  border: 1px solid #5B2D8E;
}

/* Markdown content styles */
.message-content p {
  margin: 0 0 0.5em 0;
}

.message-content p:last-child {
  margin-bottom: 0;
}

.message-content ul, .message-content ol {
  margin: 0.5em 0;
  padding-left: 1.5em;
}

.message-content li {
  margin: 0.25em 0;
}

.message-content code {
  background: rgba(0, 0, 0, 0.08);
  padding: 0.15em 0.4em;
  border-radius: 4px;
  font-family: 'SF Mono', Monaco, 'Courier New', monospace;
  font-size: 0.9em;
}

.message.user .message-content code {
  background: rgba(255, 255, 255, 0.2);
}

.message-content pre {
  background: #1e1e1e;
  color: #d4d4d4;
  padding: 12px;
  border-radius: 8px;
  overflow-x: auto;
  margin: 0.5em 0;
}

.message-content pre code {
  background: none;
  padding: 0;
  color: inherit;
  font-size: 0.85em;
}

.message-content blockquote {
  border-left: 3px solid #8B5CC0;
  margin: 0.5em 0;
  padding-left: 1em;
  color: #666;
}

.message-content table {
  border-collapse: collapse;
  margin: 0.5em 0;
  width: 100%;
}

.message-content th, .message-content td {
  border: 1px solid #D1C3E0;
  padding: 8px;
  text-align: left;
}

.message-content th {
  background: #E8DDF2;
}

.message-content h1, .message-content h2, .message-content h3 {
  margin: 0.5em 0 0.3em 0;
  font-weight: 600;
}

.message-content h1 { font-size: 1.3em; }
.message-content h2 { font-size: 1.15em; }
.message-content h3 { font-size: 1.05em; }

.message-time {
  font-size: 0.7rem;
  opacity: 0.7;
  margin-top: 4px;
  display: block;
}

.message.user .message-time {
  text-align: right;
}

/* Empty State */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #999;
  text-align: center;
  padding: 40px;
}

.empty-state-icon {
  font-size: 3rem;
  margin-bottom: 16px;
  opacity: 0.5;
}

/* Loading indicator */
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 12px 16px;
  align-self: flex-start;
  background: #E8DDF2;
  border-radius: 16px;
  border-bottom-left-radius: 4px;
  border: 1px solid #8B5CC0;
}

.typing-indicator span {
  width: 8px;
  height: 8px;
  background: #8B5CC0;
  border-radius: 50%;
  animation: bounce 1.4s infinite ease-in-out;
}

.typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
.typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
.typing-indicator span:nth-child(3) { animation-delay: 0s; }

@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}

/* Input Area */
.input-area {
  padding: 16px 20px;
  border-top: 1px solid #D1C3E0;
  background: #F5F0FA;
  flex-shrink: 0;
}

.input-options {
  display: flex;
  gap: 16px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  align-items: center;
}

.input-options select {
  padding: 8px 12px;
  font-size: 14px;
  border: 2px solid #D1C3E0;
  border-radius: 8px;
  background-color: #fff;
  cursor: pointer;
  transition: border-color 0.3s;
}

.input-options select:focus {
  outline: none;
  border-color: #8B5CC0;
}

.checkbox-label {
  display: flex;
  align-items: center;
  cursor: pointer;
  font-size: 14px;
  color: #666;
}

.checkbox-label input[type="checkbox"] {
  width: 16px;
  height: 16px;
  margin-right: 6px;
  cursor: pointer;
  accent-color: #8B5CC0;
}

.input-row {
  display: flex;
  gap: 12px;
}

.input-row input[type="text"] {
  flex: 1;
  padding: 14px 18px;
  font-size: 16px;
  border: 2px solid #D1C3E0;
  border-radius: 24px;
  background-color: #fff;
  transition: border-color 0.3s;
}

.input-row input[type="text"]:focus {
  outline: none;
  border-color: #8B5CC0;
}

.input-row button {
  padding: 14px 24px;
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  background: linear-gradient(135deg, #6B3FA0 0%, #8B5CC0 100%);
  border: none;
  border-radius: 24px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  white-space: nowrap;
}

.input-row button:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(107, 63, 160, 0.4);
}

.input-row button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

footer {
  text-align: center;
  padding: 10px;
  font-size: 0.8rem;
  color: #666;
  flex-shrink: 0;
}

.corner-logo {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 50px;
  height: auto;
  z-index: 1000;
}

/* History loading */
.history-loading {
  text-align: center;
  padding: 20px;
  color: #999;
}

/* Tool call message boxes */
.message.tool-call {
  align-self: flex-start;
  background: #F0EBF8;
  color: #4A2070;
  border-bottom-left-radius: 4px;
  border: 1px dashed #8B5CC0;
  max-width: 80%;
  font-size: 0.9em;
  transition: opacity 0.4s ease;
}

.message.tool-call.fading {
  opacity: 0;
}

.tool-call-label {
  font-size: 0.72rem;
  font-weight: 600;
  color: #6B3FA0;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 6px;
}

.message.tool-call .message-content {
  font-family: 'SF Mono', Monaco, 'Courier New', monospace;
  white-space: pre-wrap;
  word-break: break-word;
}

</style>
</head>
<body>
<div class="container">
  <header>
    <img id="headerLogo" src="/static/analyst.png" style="height: 50px; width: auto;" />
    <div class="header-content">
      <h1 id="headerTitle">QA Assistant</h1>
      <p class="subtitle">Ask questions about an insurance policy</p>
    </div>
    <button id="newChatBtn" class="new-chat-btn">New Chat</button>
  </header>

  <div id="chatContainer" class="chat-container">
    <div class="empty-state" id="emptyState">
      <div class="empty-state-icon">💬</div>
      <p>Start a conversation by asking a question below</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-options">
      <select id="persona" name="persona">
        <option value="broker">Insurance Broker</option>
        <option value="analyst">Insurance Analyst</option>
        <option value="none">Not authenticated</option>
      </select>
      <select id="workflow" name="workflow">
        <option value="agent_assist_agentic_workflow">No MCP - all tools in Agent Logic</option>
        <option value="agent_assist_mcp_agentic_workflow">Multiple MCP servers - Many Tools </option>
         <option value="agent_assist_mcp_agentic_workflow_brokers">Context Forge - Virtual MCP server for Brokers</option>
        <option value="agent_assist_mcp_agentic_workflow_analysts">Context Forge - Virtual MCP server for Analysts</option>
      </select>
    </div>
    <form id="chatForm" class="input-row">
      <input
        type="text"
        id="query"
        name="query"
        placeholder="Type your question..."
        required
        autocomplete="off"
      />
      <button type="submit" id="submitBtn">Send</button>
    </form>
  </div>
</div>

<footer>
  ContextForge demo for Insurance Agent Assist
</footer>

<script>
// Configure marked for markdown rendering with syntax highlighting
marked.setOptions({
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
  gfm: true
});

// Render markdown safely
function renderMarkdown(text) {
  if (!text) return '';
  const html = marked.parse(text);
  return DOMPurify.sanitize(html);
}

const form = document.getElementById('chatForm');
const queryInput = document.getElementById('query');
const workflowSelect = document.getElementById('workflow');
const personaSelect = document.getElementById('persona');
const submitBtn = document.getElementById('submitBtn');
const chatContainer = document.getElementById('chatContainer');
const emptyState = document.getElementById('emptyState');
const newChatBtn = document.getElementById('newChatBtn');
const headerLogo = document.getElementById('headerLogo');
const headerTitle = document.getElementById('headerTitle');

// Tokens per persona — set values via environment or server-side injection
const BROKER_CONTEXT_FORGE_TOKEN = window.BROKER_CONTEXT_FORGE_TOKEN || '';
const ANALYST_CONTEXT_FORGE_TOKEN = window.ANALYST_CONTEXT_FORGE_TOKEN || '';

function updateHeaderForPersona(persona) {
  if (persona === 'analyst') {
    headerLogo.src = '/static/analyst.png';
    headerTitle.textContent = 'Analyst persona';
  } else if (persona === 'broker') {
    headerLogo.src = '/static/broker.png';
    headerTitle.textContent = 'Insurance broker persona';
  } else {
    headerLogo.src = '/static/unknown.png';
    headerTitle.textContent = 'Not authenticated';
  }
}

function getPersonaToken() {
  const persona = personaSelect.value;
  if (persona === 'broker' && BROKER_CONTEXT_FORGE_TOKEN) return BROKER_CONTEXT_FORGE_TOKEN;
  if (persona === 'analyst' && ANALYST_CONTEXT_FORGE_TOKEN) return ANALYST_CONTEXT_FORGE_TOKEN;
  return null;
}

personaSelect.addEventListener('change', () => {
  updateHeaderForPersona(personaSelect.value);
});

// Set initial header based on default persona selection
updateHeaderForPersona(personaSelect.value);

// Backend URL injected by server, fallback for local dev
const BACKEND_URL = window.BACKEND_URL || 'http://localhost:8002';

// Thread ID for conversation tracking
let currentThreadId = generateUUID();

// Generate UUID v4
function generateUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    const r = Math.random() * 16 | 0;
    const v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

// Reset conversation with new thread ID
function resetConversation() {
  currentThreadId = generateUUID();
  // Clear all messages from chat container
  const messages = chatContainer.querySelectorAll('.message, .typing-indicator');
  messages.forEach(msg => msg.remove());
  updateEmptyState();
  queryInput.focus();
}

// Format timestamp
function formatTime(date) {
  return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// Hide empty state when there are messages
function updateEmptyState() {
  const hasMessages = chatContainer.querySelectorAll('.message').length > 0;
  emptyState.style.display = hasMessages ? 'none' : 'flex';
}

// Scroll to bottom of chat
function scrollToBottom() {
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

// Add a message to the chat
function addMessage(content, type, timestamp = new Date()) {
  const messageDiv = document.createElement('div');
  messageDiv.className = `message ${type}`;

  const textSpan = document.createElement('div');
  textSpan.className = 'message-content';

  // Render markdown for assistant messages, plain text for user messages
  if (type === 'assistant') {
    textSpan.innerHTML = renderMarkdown(content);
  } else {
    textSpan.textContent = content;
  }

  const timeSpan = document.createElement('span');
  timeSpan.className = 'message-time';
  timeSpan.textContent = formatTime(timestamp);

  messageDiv.appendChild(textSpan);
  messageDiv.appendChild(timeSpan);

  chatContainer.appendChild(messageDiv);
  updateEmptyState();
  scrollToBottom();

  return messageDiv;
}

// Add typing indicator
function addTypingIndicator() {
  const indicator = document.createElement('div');
  indicator.className = 'typing-indicator';
  indicator.id = 'typingIndicator';
  indicator.innerHTML = '<span></span><span></span><span></span>';
  chatContainer.appendChild(indicator);
  scrollToBottom();
  return indicator;
}

// Remove typing indicator
function removeTypingIndicator() {
  const indicator = document.getElementById('typingIndicator');
  if (indicator) {
    indicator.remove();
  }
}

// Create streaming message placeholder
function createStreamingMessage() {
  const messageDiv = document.createElement('div');
  messageDiv.className = 'message assistant streaming';
  messageDiv.id = 'streamingMessage';

  const textSpan = document.createElement('div');
  textSpan.className = 'message-content';
  textSpan.innerHTML = '';

  const timeSpan = document.createElement('span');
  timeSpan.className = 'message-time';
  timeSpan.textContent = formatTime(new Date());

  messageDiv.appendChild(textSpan);
  messageDiv.appendChild(timeSpan);

  chatContainer.appendChild(messageDiv);
  scrollToBottom();

  return messageDiv;
}

// Update streaming message content with markdown rendering
function updateStreamingMessage(content) {
  const messageDiv = document.getElementById('streamingMessage');
  if (messageDiv) {
    const textSpan = messageDiv.querySelector('.message-content');
    textSpan.innerHTML = renderMarkdown(content);
    scrollToBottom();
  }
}

// Finalize streaming message
function finalizeStreamingMessage() {
  const messageDiv = document.getElementById('streamingMessage');
  if (messageDiv) {
    messageDiv.classList.remove('streaming');
    messageDiv.removeAttribute('id');
  }
}

// Add an individual tool call box
function addToolCallMessage(content) {
  const messageDiv = document.createElement('div');
  messageDiv.className = 'message tool-call';

  const label = document.createElement('div');
  label.className = 'tool-call-label';
  label.textContent = '⚙ Tool Call';

  const textSpan = document.createElement('div');
  textSpan.className = 'message-content';
  textSpan.textContent = content;

  const timeSpan = document.createElement('span');
  timeSpan.className = 'message-time';
  timeSpan.textContent = formatTime(new Date());

  messageDiv.appendChild(label);
  messageDiv.appendChild(textSpan);
  messageDiv.appendChild(timeSpan);

  chatContainer.appendChild(messageDiv);
  updateEmptyState();
  scrollToBottom();

  return messageDiv;
}

// Streaming request handler
async function handleStreamingRequest(query, selectedWorkflow, contextForge = false, contextForgeToken = null, contextForgeVirtualMcp = null) {
  const body = { query: query, workflow: selectedWorkflow, thread_id: currentThreadId };
  if (contextForge) {
    body.context_forge = true;
    body.context_forge_token = contextForgeToken;
    body.context_forge_virtual_mcp = contextForgeVirtualMcp;
  }

  const response = await fetch(`${BACKEND_URL}/stream_chat`, {
    method: 'POST',
    credentials: 'same-origin',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!response.ok) {
    throw new Error(`HTTP error! status: ${response.status}`);
  }

  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let accumulatedContent = '';
  let buffer = '';
  let qaMessageCreated = false;
  const toolCallBoxes = [];

  while (true) {
    const { done, value } = await reader.read();

    if (done) {
      break;
    }

    buffer += decoder.decode(value, { stream: true });

    // Process complete SSE messages (data:...\n\n)
    const messages = buffer.split('\n\n');
    buffer = messages.pop() || ''; // Keep incomplete message in buffer

    for (const message of messages) {
      if (message.startsWith('data:')) {
        try {
          const jsonStr = message.slice(5); // Remove 'data:' prefix
          const data = JSON.parse(jsonStr);

          const eventType = data.type;
          const content = data.content || data.message || '';

          if (eventType === 'tool_call_request') {
            // Each tool call request gets its own individual chat box
            if (content) {
              toolCallBoxes.push(addToolCallMessage(content));
            }
          } else {
            // qa_final_message (or untyped): stream into the conversation box
            if (!qaMessageCreated) {
              // Fade out and remove all tool call boxes
              toolCallBoxes.forEach(box => {
                box.classList.add('fading');
                setTimeout(() => box.remove(), 400);
              });
              createStreamingMessage();
              qaMessageCreated = true;
            }
            if (content) {
              accumulatedContent += content;
              updateStreamingMessage(accumulatedContent);
            }
          }
        } catch (parseError) {
          console.warn('Failed to parse SSE message:', message, parseError);
        }
      }
    }
  }

  // Final update for qa message
  if (qaMessageCreated && !accumulatedContent) {
    updateStreamingMessage('No response received');
  }

  finalizeStreamingMessage();
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const query = queryInput.value.trim();
  if (!query) return;

  let selectedWorkflow = workflowSelect.value;
  let contextForge = false;
  let contextForgeToken = null;
  let contextForgeVirtualMcp = null;

  if (selectedWorkflow === 'agent_assist_mcp_agentic_workflow_brokers') {
    selectedWorkflow = 'agent_assist_mcp_agentic_workflow';
    contextForge = true;
    contextForgeToken = getPersonaToken();
    contextForgeVirtualMcp = 'broker_gateway';
  } else if (selectedWorkflow === 'agent_assist_mcp_agentic_workflow_analysts') {
    selectedWorkflow = 'agent_assist_mcp_agentic_workflow';
    contextForge = true;
    contextForgeToken = getPersonaToken();
    contextForgeVirtualMcp = 'analysts_gateway';
  }

  // Add user message to chat
  addMessage(query, 'user');

  // Clear input
  queryInput.value = '';

  // Disable input while processing
  submitBtn.disabled = true;
  queryInput.disabled = true;

  try {
    await handleStreamingRequest(query, selectedWorkflow, contextForge, contextForgeToken, contextForgeVirtualMcp);
  } catch (error) {
    removeTypingIndicator();
    addMessage(`${error.message}. Make sure the backend server is running.`, 'error');
  } finally {
    submitBtn.disabled = false;
    queryInput.disabled = false;
    queryInput.focus();
  }
});

// Allow Enter key to submit
queryInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    form.dispatchEvent(new Event('submit'));
  }
});

// New chat button handler
newChatBtn.addEventListener('click', () => {
  resetConversation();
});

document.addEventListener('DOMContentLoaded', () => {
  queryInput.focus();
});
</script>
</body>
</html>
